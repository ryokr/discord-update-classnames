name: Lint

on:
    push:
        branches: ["*"]
    pull_request:
        branches: ["*"]

permissions:
    contents: read

jobs:
    prettier:
        name: Prettier
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install
              uses: ./.github/actions/install

            - name: Run Prettier
              run: pnpm run prettier:check

    eslint:
        name: ESLint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install
              uses: ./.github/actions/install

            - name: Run ESLint
              run: pnpm run eslint:check

    typescript:
        name: TypeScript
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install
              uses: ./.github/actions/install

            - name: Run TypeScript
              run: pnpm run typescript:check
